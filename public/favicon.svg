<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Clock face ring -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Hour markers at 12, 3, 6, 9 -->
  <circle cx="24" cy="8" r="1.5" fill="white" fill-opacity="0.45"/>
  <circle cx="40" cy="24" r="1.5" fill="white" fill-opacity="0.45"/>
  <circle cx="24" cy="40" r="1.5" fill="white" fill-opacity="0.45"/>
  <circle cx="8" cy="24" r="1.5" fill="white" fill-opacity="0.45"/>
  <!-- Hour hand (10 o'clock) — bold -->
  <line x1="24" y1="24" x2="13" y2="9" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Minute hand (2 o'clock) — bold -->
  <line x1="24" y1="24" x2="37" y2="9" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Forward slash between hands — code reference -->
  <line x1="20" y1="16" x2="28" y2="6" stroke="white" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="3.5" fill="white"/>
</svg>
